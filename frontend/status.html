<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大龙虾状态</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0d0d0d;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #00ff41;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 12px;
    }

    /* ===== 顶部状态栏 ===== */
    #top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 2px solid #00ff41;
      padding: 6px 12px;
      background: #000;
      margin-bottom: 12px;
      font-size: 13px;
      image-rendering: pixelated;
    }

    #top-bar .label {
      color: #00ff41;
      letter-spacing: 0.1em;
    }

    #top-bar .time {
      color: #00cc33;
    }

    #state-badge {
      color: #ffff00;
    }

    /* ===== 像素大龙虾 ===== */
    #lobster-art {
      font-size: clamp(8px, 1.4vw, 14px);
      line-height: 1.1;
      color: #ff4444;
      letter-spacing: 0;
      white-space: pre;
      margin-bottom: 4px;
      text-shadow: 0 0 8px rgba(255, 80, 40, 0.8);
      animation: lobster-glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes lobster-glow {
      from { text-shadow: 0 0 8px rgba(255,80,40,0.6); filter: brightness(1); }
      to   { text-shadow: 0 0 20px rgba(255,100,50,1); filter: brightness(1.2); }
    }

    #lobster-art.idle    { animation: lobster-idle 3s ease-in-out infinite; }
    #lobster-art.working { animation: lobster-work 0.4s steps(2) infinite; color: #4ade80; }
    #lobster-art.researching { animation: lobster-scan 1s steps(3) infinite; color: #60a5fa; }
    #lobster-art.executing { animation: lobster-exec 0.3s steps(2) infinite; color: #a78bfa; }
    #lobster-art.syncing { animation: lobster-sync 0.8s linear infinite; color: #38bdf8; }
    #lobster-art.error   { animation: lobster-err 0.25s steps(2) infinite; color: #ff4444; }
    #lobster-art.waiting_subagent { animation: lobster-wait 1s ease-in-out infinite; color: #fbbf24; }

    @keyframes lobster-idle  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    @keyframes lobster-work  { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes lobster-scan  { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }
    @keyframes lobster-exec  { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
    @keyframes lobster-sync  { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes lobster-err  { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes lobster-wait { 0%,100% { transform: translateY(0) scale(1); } 30% { transform: translateY(-3px) scale(1.1); } 60% { transform: translateY(0); } }

    /* ===== 主状态文字 ===== */
    #status {
      font-size: clamp(40px, 9vw, 120px);
      font-weight: 900;
      color: #00ff41;
      letter-spacing: 0.1em;
      text-align: center;
      transition: opacity 0.25s, transform 0.25s;
      line-height: 1;
      margin-bottom: 2px;
      text-shadow: 0 0 20px rgba(0,255,65,0.6), 4px 4px 0 #003300;
      animation: text-flicker 4s linear infinite;
      image-rendering: pixelated;
    }

    #status.idle    { color: #888; text-shadow: 4px 4px 0 #333; animation: none; }
    #status.working { color: #4ade80; text-shadow: 0 0 20px rgba(74,222,128,0.8), 4px 4px 0 #166534; }
    #status.researching { color: #60a5fa; text-shadow: 0 0 20px rgba(96,165,250,0.8), 4px 4px 0 #1e3a8a; }
    #status.executing { color: #a78bfa; text-shadow: 0 0 20px rgba(167,139,250,0.8), 4px 4px 0 #4c1d95; }
    #status.syncing { color: #38bdf8; text-shadow: 0 0 20px rgba(56,189,248,0.8), 4px 4px 0 #0369a1; }
    #status.error   { color: #ff4444; text-shadow: 0 0 20px rgba(255,68,68,0.8), 4px 4px 0 #7f1d1d; animation: error-flash 0.5s steps(2) infinite; }
    #status.waiting_subagent { color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.8), 4px 4px 0 #92400e; }

    @keyframes text-flicker {
      0%,95%,100% { opacity: 1; }
      96% { opacity: 0.85; }
      97% { opacity: 1; }
      98% { opacity: 0.9; }
    }

    @keyframes error-flash {
      0%,100% { opacity: 1; transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    /* ===== 副标题 ===== */
    #sub {
      font-size: clamp(10px, 1.6vw, 16px);
      color: #00aa30;
      letter-spacing: 0.2em;
      text-align: center;
      margin-bottom: 12px;
      transition: color 0.4s;
    }

    #sub.working   { color: #86efac; }
    #sub.researching { color: #93c5fd; }
    #sub.executing { color: #c4b5fd; }
    #sub.syncing   { color: #7dd3fc; }
    #sub.error     { color: #ff6666; }
    #sub.waiting_subagent { color: #fde68a; }

    /* ===== 任务进度条 ===== */
    #task-bar {
      width: 100%;
      max-width: 700px;
      border: 2px solid #00ff41;
      background: #000;
      padding: 10px 14px;
      font-size: clamp(10px, 1.5vw, 14px);
      image-rendering: pixelated;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #task-bar-header {
      color: #00ff41;
      font-size: clamp(9px, 1.3vw, 12px);
      letter-spacing: 0.15em;
      border-bottom: 1px solid #003300;
      padding-bottom: 4px;
      margin-bottom: 2px;
    }

    .task-line {
      color: #00cc33;
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: task-type 0.5s steps(20) forwards;
    }

    .task-line.active {
      color: #00ff41;
    }

    .task-line.active::before {
      content: '> ';
      color: #4ade80;
    }

    .task-line.done {
      color: #555;
      text-decoration: line-through;
    }

    .task-line.done::before {
      content: '# ';
      color: #333;
    }

    @keyframes task-type {
      from { width: 0; overflow: hidden; }
      to   { width: 100%; overflow: hidden; }
    }

    /* 进度条填充 */
    #progress-fill {
      width: 100%;
      height: 20px;
      border: 1px solid #00ff41;
      background: #000;
      margin-top: 6px;
      position: relative;
      overflow: hidden;
    }

    #progress-fill-bar {
      height: 100%;
      background: repeating-linear-gradient(
        90deg,
        #00ff41 0px, #00ff41 12px,
        #00aa30 12px, #00aa30 24px
      );
      transition: width 0.4s steps(10);
      image-rendering: pixelated;
    }

    #progress-pct {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: #003300;
      mix-blend-mode: difference;
    }

    /* ===== 底部动画条 ===== */
    #bottom-anim {
      width: 100%;
      max-width: 700px;
      height: 6px;
      background: #111;
      border: 1px solid #003300;
      margin-top: 8px;
      overflow: hidden;
    }

    #bottom-bar {
      height: 100%;
    }

    #bottom-bar.idle    { width: 4px; left: calc(50% - 2px); background: #333; }
    #bottom-bar.working { width: 100%; background: repeating-linear-gradient(90deg, #4ade80 0, #4ade80 16px, transparent 16px, transparent 24px); background-size: 40px 100%; animation: march-left 1.2s linear infinite; }
    #bottom-bar.researching { width: 60%; left: 20%; background: #60a5fa; animation: pulse-bar 1.5s ease-in-out infinite; }
    #bottom-bar.executing { width: 80%; left: 10%; background: repeating-linear-gradient(90deg, #a78bfa 0, #a78bfa 8px, transparent 8px, transparent 16px); background-size: 32px 100%; animation: march-right 0.8s linear infinite; }
    #bottom-bar.syncing { width: 100%; background: repeating-linear-gradient(90deg, #38bdf8 0, #38bdf8 20px, transparent 20px, transparent 30px, #38bdf8 30px, #38bdf8 40px, transparent 40px, transparent 60px); background-size: 80px 100%; animation: scan-bar 2s linear infinite; }
    #bottom-bar.error   { width: 100%; background: #ff4444; animation: blink-bar 0.4s steps(2) infinite; }
    #bottom-bar.waiting_subagent { width: 100%; background: repeating-linear-gradient(90deg, #fbbf24 0, #fbbf24 12px, #f59e0b 12px, #f59e0b 24px, #d97706 24px, #d97706 36px, transparent 36px, transparent 48px); background-size: 64px 100%; animation: march-left 2s linear infinite; }

    #bottom-bar {
      position: relative;
    }

    @keyframes march-left {
      from { background-position: 0 0; }
      to   { background-position: -40px 0; }
    }

    @keyframes march-right {
      from { background-position: 0 0; }
      to   { background-position: 32px 0; }
    }

    @keyframes scan-bar {
      from { background-position: 0 0; }
      to   { background-position: 80px 0; }
    }

    @keyframes pulse-bar {
      0%,100% { width: 40%; left: 30%; opacity: 0.5; }
      50%      { width: 60%; left: 20%; opacity: 1; }
    }

    @keyframes blink-bar {
      0%,49% { opacity: 1; }
      50%,100% { opacity: 0.1; }
    }

    /* ===== 四角装饰 ===== */
    .corner {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid #003300;
    }
    .corner-tl { top: 4px; left: 4px; border-right: none; border-bottom: none; }
    .corner-tr { top: 4px; right: 4px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 4px; left: 4px; border-right: none; border-top: none; }
    .corner-br { bottom: 4px; right: 4px; border-left: none; border-top: none; }

    /* ===== 扫描线效果 ===== */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="top-bar">
    <span class="label">LOBSTER_OS <span id="state-badge">IDLE</span></span>
    <span class="time" id="time">00:00:00</span>
  </div>

  <div id="lobster-art" class="idle">
  ██████╗ ███████╗ █████╗ ██╗
  ██╔══██╗██╔════╝██╔══██╗██║
  ██║  ██║█████╗  ███████║██║
  ██║  ██║██╔══╝  ██╔══██║██║
  ██████╔╝███████╗██║  ██║██║
  ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝
  </div>

  <div id="status" class="idle">待机</div>
  <div id="sub">休息中，随时待命</div>

  <div id="task-bar">
    <div id="task-bar-header">// TERMINAL v3.2 — 任务监控</div>
    <div id="task-list">
      <div class="task-line active">等待任务输入...</div>
    </div>
    <div id="progress-fill">
      <div id="progress-fill-bar" style="width: 0%"></div>
      <div id="progress-pct">0%</div>
    </div>
  </div>

  <div id="bottom-anim">
    <div id="bottom-bar" class="idle"></div>
  </div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <script>
    let currentState = null;

    const LOBSTER_ARTS = {
      idle: `  ██████╗ ███████╗ █████╗ ██╗
  ██╔══██╗██╔════╝██╔══██╗██║
  ██║  ██║█████╗  ███████║██║
  ██║  ██║██╔══╝  ██╔══██║██║
  ██████╔╝███████╗██║  ██║██║
  ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝`,
      working: `  ██████╗ ███████╗ █████╗ ██╗
  ██╔══██╗██╔════╝██╔══██╗██║
  ██║  ██║█████╗  ███████║██║
  ██║  ██║██╔══╝  ██╔══██║██║
  ██████╔╝███████╗██║  ██║██║
  ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝`,
      researching: `  ██████╗ ███████╗ █████╗ ██╗
  ██╔══██╗██╔════╝██╔══██╗██║
  ██║  ██║█████╗  ███████║██║
  ██║  ██║██╔══╝  ██╔══██║██║
  ██████╔╝███████╗██║  ██║██║
  ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝`,
      executing: `  ██████╗ ███████╗ █████╗ ██╗
  ██╔══██╗██╔════╝██╔══██╗██║
  ██║  ██║█████╗  ███████║██║
  ██║  ██║██╔══╝  ██╔══██║██║
  ██████╔╝███████╗██║  ██║██║
  ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝`,
      syncing: `  ██████╗ ███████╗ █████╗ ██╗
  ██╔══██╗██╔════╝██╔══██╗██║
  ██║  ██║█████╗  ███████║██║
  ██║  ██║██╔══╝  ██╔══██║██║
  ██████╔╝███████╗██║  ██║██║
  ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝`,
      error: `  ██████╗ ███████╗ █████╗ ██╗
  ██╔══██╗██╔════╝██╔══██╗██║
  ██║  ██║█████╗  ███████║██║
  ██║  ██║██╔══╝  ██╔══██║██║
  ██████╔╝███████╗██║  ██║██║
  ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝`,
      waiting_subagent: `  ██████╗ ███████╗ █████╗ ██╗
  ██╔══██╗██╔════╝██╔══██╗██║
  ██║  ██║█████╗  ███████║██║
  ██║  ██║██╔══╝  ██╔══██║██║
  ██████╔╝███████╗██║  ██║██║
  ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝`
    };

    const LABELS = {
      idle:           '待机',
      working:        '工作中',
      researching:     '思考中',
      executing:      '执行中',
      syncing:        '同步中',
      error:          '报错',
      waiting_subagent: '等待子代理'
    };

    const SUB_LABELS = {
      idle:           '休息中，随时待命',
      working:        '正在处理任务',
      researching:     '正在思考问题',
      executing:      '正在执行任务',
      syncing:        '同步数据中...',
      error:          '发现问题，排查中',
      waiting_subagent: '等待子代理响应中...'
    };

    const BADGE_NAMES = {
      idle: 'IDLE',
      working: 'WORK',
      researching: 'SCAN',
      executing: 'EXEC',
      syncing: 'SYNC',
      error: 'ERROR',
      waiting_subagent: 'WAIT'
    };

    // 模拟任务列表
    const DEMO_TASKS = {
      idle: ['等待任务输入...'],
      working: ['[1/3] 分析任务需求...', '[2/3] 执行处理中 >>>', '[3/3] 整理结果输出'],
      researching: ['搜索相关信息...', '解析搜索结果...', '归纳总结中...'],
      executing: ['启动进程...', '加载资源文件...', '执行主逻辑...', '回收临时文件...'],
      syncing: ['连接同步服务器...', '打包本地数据...', '上传至云端...', '验证数据完整性...'],
      error: ['检测到异常状况', '收集错误日志', '分析错误原因'],
      waiting_subagent: ['向子代理发送任务...', '等待子代理响应...', '接收子代理结果...']
    };

    function updateTime() {
      const n = new Date();
      document.getElementById('time').textContent =
        `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
    }

    function setTasks(state) {
      const list = document.getElementById('task-list');
      const tasks = DEMO_TASKS[state] || DEMO_TASKS.idle;
      list.innerHTML = '';
      tasks.forEach((t, i) => {
        const d = document.createElement('div');
        d.className = 'task-line' + (i === tasks.length - 1 ? ' active' : (i < tasks.length - 1 ? ' done' : ''));
        d.textContent = t;
        list.appendChild(d);
      });

      // 进度
      const pct = tasks.length > 1 ? Math.round(((tasks.length - 1) / tasks.length) * 100) : 0;
      document.getElementById('progress-fill-bar').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '%';
    }

    async function fetchStatus() {
      try {
        const r = await fetch('/status?t=' + Date.now());
        const d = await r.json();
        const s  = d.state || 'idle';
        const dt = d.detail || '';

        if (s !== currentState) {
          const el  = document.getElementById('status');
          const lob = document.getElementById('lobster-art');
          const bar = document.getElementById('bottom-bar');
          const sub = document.getElementById('sub');
          const badge = document.getElementById('state-badge');

          el.style.opacity = '0';
          setTimeout(() => {
            lob.innerHTML = LOBSTER_ARTS[s] || LOBSTER_ARTS.idle;
            lob.className = s;

            el.textContent = LABELS[s] || s;
            el.className = s;

            bar.className = s;

            badge.textContent = BADGE_NAMES[s] || 'IDLE';
            badge.style.color = (
              s === 'error' ? '#ff4444' :
              s === 'working' ? '#4ade80' :
              s === 'researching' ? '#60a5fa' :
              s === 'executing' ? '#a78bfa' :
              s === 'syncing' ? '#38bdf8' :
              s === 'waiting_subagent' ? '#fbbf24' : '#ffff00'
            );

            sub.className = s;
            sub.textContent = dt || SUB_LABELS[s] || '';

            setTasks(s);

            el.style.opacity = '1';
            currentState = s;
          }, 250);
        }
      } catch (e) {
        document.getElementById('sub').textContent = '连接失败';
      }
    }

    updateTime();
    setInterval(updateTime, 1000);
    fetchStatus();
    setInterval(fetchStatus, 2000);
  </script>
</body>
</html>
