<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大龙虾状态</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    body { display: flex; flex-direction: column; padding: 0; }

    #status-wrap {
      padding: 30px 16px 0;
      text-align: center;
    }

    #status {
      font-size: clamp(60px, 16vw, 240px);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1;
      color: #555;
      text-shadow: 4px 4px 0 #222;
    }
    #status.working { color: #4ade80; text-shadow: 0 0 40px #4ade80; }
    #status.waiting { color: #fbbf24; text-shadow: 0 0 40px #fbbf24; }

    #detail-box {
      margin: 28px auto 0;
      width: min(960px, 98vw);
      border: 2px solid #fff;
      background: #000;
      padding: 48px 60px;
      overflow: hidden;
    }

    #marquee-wrap {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
    }

    #marquee-inner {
      display: inline-block;
      white-space: nowrap;
      font-size: clamp(60px, 12vw, 96px);
      color: #00ff41;
      letter-spacing: 0.1em;
      animation: marquee-scroll 14s linear infinite;
    }

    @keyframes marquee-scroll {
      0%   { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    #progress-wrap {
      margin: 40px auto 0;
      width: min(960px, 98vw);
      height: 48px;
      position: relative;
    }

    #progress-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    #summary-box {
      margin: 20px auto 0;
      width: min(960px, 98vw);
      border: 2px solid #4ade80;
      background: #0a0a0a;
      padding: 24px 32px;
      min-height: 60px;
      display: none;
    }

    #summary-box.visible { display: block; }

    #summary-label {
      font-size: clamp(20px, 3vw, 32px);
      color: #4ade80;
      font-weight: bold;
      margin-bottom: 12px;
      letter-spacing: 0.1em;
    }

    #summary-text {
      font-size: clamp(24px, 3.5vw, 40px);
      color: #00ff41;
      line-height: 1.4;
      letter-spacing: 0.05em;
    }

    .corner { position: fixed; width: 14px; height: 14px; border: 2px solid #333; z-index: 3; }
    .tl{top:6px;left:6px;border-right:none;border-bottom:none}
    .tr{top:6px;right:6px;border-left:none;border-bottom:none}
    .bl{bottom:6px;left:6px;border-right:none;border-top:none}
    .br{bottom:6px;right:6px;border-left:none;border-top:none}
  </style>
</head>
<body>
  <div id="status-wrap">
    <div id="status">待机</div>
  </div>

  <div id="detail-box">
    <div id="marquee-wrap">
      <div id="marquee-inner">休息中，随时待命</div>
    </div>
  </div>

  <div id="progress-wrap">
    <svg id="progress-svg" viewBox="0 0 960 48" preserveAspectRatio="none">
      <rect x="0" y="0" width="960" height="48" fill="#000"/>
      <rect id="progress-bar" x="0" y="0" width="0" height="48" fill="#fff"/>
    </svg>
  </div>

  <div id="summary-box">
    <div id="summary-label">📋 最近任务总结</div>
    <div id="summary-text"></div>
  </div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <script>
    const LABEL = { idle: '待机', working: '工作中', waiting: '等待子代理' };
    const DETAIL = {
      idle: '休息中，随时待命',
      working: '正在处理任务，请稍候...',
      waiting: '等待子代理响应中...'
    };
    let currentTask = '';
    let currentSummary = '';

    let state = 'idle';
    let progress = 0;
    let progressTimer = null;

    function setMarquee(text) {
      const el = document.getElementById('marquee-inner');
      const displayText = text || DETAIL[state] || '休息中，随时待命';
      el.textContent = displayText;
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    }

    function startProgress() {
      clearInterval(progressTimer);
      progress = 60;
      function tick() {
        const step = Math.random() * 10 + 5;
        progress = Math.min(92, progress + step);
        document.getElementById('progress-bar').setAttribute('width', Math.round(progress / 100 * 960));
      }
      tick();
      progressTimer = setInterval(tick, 2000);
    }

    function stopProgress() {
      clearInterval(progressTimer);
      document.getElementById('progress-bar').setAttribute('width', '0');
    }

    function updateUI(s) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = LABEL[s];
      statusEl.className = s === 'idle' ? '' : s;
      setMarquee(currentTask || DETAIL[s]);
      if (s === 'idle') stopProgress();
      else startProgress();
    }

    function updateSummary(summary) {
      const box = document.getElementById('summary-box');
      const text = document.getElementById('summary-text');
      if (summary && summary.trim()) {
        currentSummary = summary;
        text.textContent = summary;
        box.classList.add('visible');
      } else {
        currentSummary = '';
        text.textContent = '';
        box.classList.remove('visible');
      }
    }

    async function fetchStatus() {
      try {
        const r = await fetch('/status?t=' + Date.now());
        const d = await r.json();
        let s = d.state || 'idle';
        if (s === 'writing') s = 'working'; else if (s !== 'working' && s !== 'waiting') s = 'idle';
        const task = d.detail || DETAIL[s] || '';
        if (task !== currentTask) {
          currentTask = task;
          setMarquee(task);
        }
        if (s !== state) { state = s; updateUI(state); }
        if (d.summary !== undefined && d.summary !== currentSummary) {
          updateSummary(d.summary);
        }
      } catch(e) {
        // fallback: check URL params for detail (set by set_state.py)
        const params = new URLSearchParams(window.location.search);
        const urlDetail = params.get('detail');
        if (urlDetail && urlDetail !== currentTask) {
          currentTask = urlDetail;
          setMarquee(urlDetail);
        }
      }
    }

    let idleTimer = null;
    function enterFullscreen() {
      if (document.fullscreenEnabled && !document.fullscreenElement)
        document.documentElement.requestFullscreen().catch(() => {});
    }
    function resetIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(enterFullscreen, 60000);
    }
    document.addEventListener('mousemove', resetIdleTimer);
    document.addEventListener('keydown', resetIdleTimer);
    document.addEventListener('click', () => {
      if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
      resetIdleTimer();
    });
    document.addEventListener('fullscreenchange', resetIdleTimer);
    setTimeout(enterFullscreen, 3000);

    updateUI('idle');
    fetchStatus();
    setInterval(fetchStatus, 1500);
  </script>
</body>
</html>
